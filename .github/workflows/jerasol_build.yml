name: Compile Jerasol OS Image

on:
  workflow_dispatch: # Allows you to manually click "Run" in your browser

jobs:
  build-jerasol-os:
    runs-on: ubuntu-latest
    steps:
      - name: Allocate High-Capacity Storage Workspace
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 51200
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true' # Removes default tools to make room for AOSP

      - name: Checkout Jerasol Custom Repository Source
        uses: actions/checkout@v4

      - name: Install Essential Android Compiler Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Initialize Repo Source and Synchronize Files
        run: |
          mkdir workspace
          cd workspace
          repo init -u https://github.com/LineageOS/android.git -b lineage-23.2 --git-lfs
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Compile Custom Jerasol System Image
        run: |
          cd workspace
          source build/envsetup.sh
          lunch lineage_emulator_x86_64-userdebug
          mka systemimage -j$(nproc --all)

      - name: Upload Finished OS Artifacts for Download
        uses: actions/upload-artifact@v4
        with:
          name: Jerasol-OS-System-Image
          path: workspace/out/target/product/emulator_x86_64/system.img
