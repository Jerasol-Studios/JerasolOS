name: Compile Jerasol OS Image

on:
  workflow_dispatch: # Allows you to manually click "Run" in your browser

jobs:
  build-jerasol-os:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Jerasol Custom Repository Source
        uses: actions/checkout@v4

      - name: Maximize System Disk Space Safely
        run: |
          echo "==> Before cleanup storage status:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo apt-get clean
          echo "==> After cleanup storage status:"
          df -h

      - name: Install Essential Android Compiler Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev repo

      - name: Initialize Repo Source and Synchronize Files
        run: |
          # Configure Git profile to satisfy Repo tool requirements
          git config --global user.email "developer@jerasol.com"
          git config --global user.name "Jerasol Developer"

          # Setup and synchronize the source files directly using the system tool
          mkdir workspace
          cd workspace
          repo init -u https://github.com -b lineage-20.0 --git-lfs --no-clone-bundle
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Compile Custom Jerasol System Image
        run: |
          cd workspace
          source build/envsetup.sh
          lunch lineage_emulator_x86_64-userdebug
          mka systemimage -j$(nproc --all)

      - name: Upload Finished OS Artifacts for Download
        uses: actions/upload-artifact@v4
        with:
          name: Jerasol-OS-System-Image
          path: workspace/out/target/product/emulator_x86_64/system.img
