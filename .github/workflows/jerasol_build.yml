name: Compile Jerasol OS Image

on:
  workflow_dispatch:

jobs:
  build-jerasol-os:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Jerasol Custom Repository Source
        uses: actions/checkout@v4

      - name: 2. Maximize Disk Space and Allocate Virtual Memory Swap
        run: |
          echo "==> Clearing massive pre-installed system bloat modules..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache /usr/local/share/powershell /usr/share/miniconda
          sudo apt-get clean
          
          echo "==> Safety disabling any active system swap blocks..."
          sudo swapoff -a || true
          
          echo "==> Creating balanced 8GB Memory Swap File..."
          sudo dd if=/dev/zero of=/jerasol_swap bs=1M count=8192
          sudo chmod 600 /jerasol_swap
          sudo mkswap /jerasol_swap
          sudo swapon /jerasol_swap
          free -h

      - name: 3. Install Essential Android Compiler Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 repo

      - name: 4. Initialize Repo Source and Synchronize Files (The Heavy Lift)
        run: |
          git config --global user.email "developer@jerasol.com"
          git config --global user.name "Jerasol Developer"
          
          mkdir -p jerasol_workspace
          cd jerasol_workspace
          
          repo init -u https://github.com/LineageOS/android.git -b lineage-20.0 --depth=1 --git-lfs --no-tags
          repo sync -c -j2 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

      - name: 5. Dynamic Branding Injection
        run: |
          echo "==> Running branding text customizations safely..."
          chmod +x jerasol_brand.sh
          ./jerasol_brand.sh

      - name: 6. Compile Custom Jerasol Framework Blocks
        run: |
          cd jerasol_workspace
          
          # Initialize compiler setup commands
          source build/envsetup.sh
          lunch aosp_arm64-userdebug
          
          # Injecting custom build variables natively to bypass Soong errors
          export TARGET_HEALTH_CUSTOM_IMPLEMENTATION="jerasol_handover"
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # Execute the compilation
          mka bionic -j1
