#include <stdint.h>
#include <stdbool.h>

// ==================================================================
// STM32L431KB HARDWARE REGISTER MAPPINGS (Absolute Memory Addresses)
// ==================================================================
#define PERIPH_BASE           ((uint32_t)0x40000000)
#define AHB2PERIPH_BASE       (PERIPH_BASE + 0x08000000)
#define APB1PERIPH_BASE       (PERIPH_BASE + 0x00000000)

// USART2 Pogo-Pin Hardware Mappings
#define USART2_BASE           (APB1PERIPH_BASE + 0x00004400)
#define USART2_CR1            (*(volatile uint32_t*)(USART2_BASE + 0x00))
#define USART2_RDR            (*(volatile uint32_t*)(USART2_BASE + 0x24))
#define USART2_ISR            (*(volatile uint32_t*)(USART2_BASE + 0x1C))

// GPIO Port B Base (Controls Main System Power Gate Output Pin PB0)
#define GPIOB_BASE            (AHB2PERIPH_BASE + 0x00000400)
#define GPIOB_MODER           (*(volatile uint32_t*)(GPIOB_BASE + 0x00))
#define GPIOB_ODR             (*(volatile uint32_t*)(GPIOB_BASE + 0x14))

// I2C1 Display Core Registers (Controls Screen Paint Paths Pins PA2/PA3)
#define I2C1_BASE             (APB1PERIPH_BASE + 0x00005400)
#define I2C1_CR1              (*(volatile uint32_t*)(I2C1_BASE + 0x00))
#define I2C1_TXDR             (*(volatile uint32_t*)(I2C1_BASE + 0x28))

// ==================================================================
// COMPILER DECLARATIONS (Resolves implicit declaration warnings)
// ==================================================================
uint32_t get_system_milliseconds(void);
void trigger_minimal_haptic_feedback(void);
void clear_hardware_interrupt_flag(uint8_t pin);
void handover_display_to_main_soc(void);
void execute_emergency_bypass_boot(void);
void initialize_jerasol_link(void);

// State Tracking Variables
static volatile uint8_t  bypass_tap_count = 0;
static volatile uint32_t last_tap_timestamp = 0;
static bool emergency_mode_active = true;

/**
 * Fake hardware timers for pure bare-metal environment emulation
 */
uint32_t get_system_milliseconds(void) {
    static volatile uint32_t mock_ticks = 0;
    return mock_ticks++;
}

void trigger_minimal_haptic_feedback(void) {
    // Toggles a quick voltage pulse on haptic pins for vibration feel
}

void clear_hardware_interrupt_flag(uint8_t pin) {
    // Resets internal interrupt bit to clear the trigger circuit
}

void handover_display_to_main_soc(void) {
    // Drops STM32 I2C master status to let Snapdragon drive the screen
    I2C1_CR1 &= ~(1 << 0);
}

/**
 * Initializes the USART2 Pogo-Pin Hardware Listening Circuit
 */
void initialize_jerasol_link(void) {
    // 1. Enable power clock to the USART2 peripheral module
    *(volatile uint32_t*)(0x4002101A) |= (1 << 17); 
    
    // 2. Enable receiver circuit and receive-interrupt lines
    USART2_CR1 |= (1 << 2) | (1 << 5) | (1 << 0); 
}   

/**
 * Hardware Interrupt Service Routine for JerasolLink Pogo Pin Connection
 * Triggered automatically when data arrives over Pin 2 & Pin 3
 */
void USART2_IRQHandler(void) {
    // Check if the "Receive Data Register Not Empty" flag is flipped
    if (USART2_ISR & (1 << 5)) {
        uint8_t received_byte = (uint8_t)(USART2_RDR & 0xFF);
        
        // 0x5A is the secret Jerasol hardware handshake signature code
        if (received_byte == 0x5A) {
            trigger_minimal_haptic_feedback();
            execute_emergency_bypass_boot();
        }
    }
}

/**
 * Hardware Interrupt Service Routine (ISR)
 * Triggered ONLY when the touchscreen emergency zone is physically tapped.
 */
void EXTI0_IRQHandler(void) {
    uint32_t current_time = get_system_milliseconds();
    
    // Reset counter if time between taps exceeds 2 seconds (pocket protection)
    if ((current_time - last_tap_timestamp) > 2000) {
        bypass_tap_count = 0;
    }
    
    bypass_tap_count++;
    last_tap_timestamp = current_time;
    
    trigger_minimal_haptic_feedback();
    
    // Check if the 5-tap bypass matrix threshold has been reached
    if (bypass_tap_count >= 5) {
        execute_emergency_bypass_boot();
    }
    
    clear_hardware_interrupt_flag(0);
}

/**
 * Triggers the physical hardware connection to boot the primary OS
 */
void execute_emergency_bypass_boot(void) {
    emergency_mode_active = false;
    
    // Set Pin PB0 to High to close power circuit back to standard CPU
    GPIOB_ODR |= (1 << 0); 
    
    // Hand display bus back to Android Bootloader
    handover_display_to_main_soc();
}

int main(void) {
    // 1. Configure Pin PB0 as Output Mode for power gate control
    GPIOB_MODER &= ~(3 << 0); 
    GPIOB_MODER |= (1 << 0);  
    
    // 2. Turn on the pogo pin data listener loop
    initialize_jerasol_link();
    
    // Lock MCU core into deep sleep until an interrupt wakes it up
    while(emergency_mode_active) {
        __asm__ volatile("WFI"); 
    }
    return 0;
}
