name: Compile Jerasol OS Image

on:
  workflow_dispatch:

jobs:
  build-jerasol-os:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Jerasol Custom Repository Source
        uses: actions/checkout@v4

      - name: Maximize Disk Space and Allocate Virtual Memory Swap
        run: |
          echo "==> Before cleanup storage status:"
          df -h
          
          echo "==> Purging massive pre-installed system bloat modules..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/miniconda
          sudo apt-get clean
          
          echo "==> Safety disabling any active system swap blocks..."
          sudo swapoff -a || true
          
          echo "==> Creating balanced 8GB Memory Swap File..."
          sudo dd if=/dev/zero of=/jerasol_swap bs=1M count=8192
          sudo chmod 600 /jerasol_swap
          sudo mkswap /jerasol_swap
          sudo swapon /jerasol_swap
          
          echo "==> After intensive cleanup storage status:"
          df -h

      - name: Install Essential Android Compiler Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Initialize Repo Source and Synchronize Files
        run: |
          git config --global user.email "developer@jerasol.com"
          git config --global user.name "Jerasol Developer"
          
          # Stable official Google Git repo tool binary delivery
          mkdir -p bin
          curl https://googlesource.com | base64 --decode > bin/repo
          chmod a+x bin/repo
          
          mkdir -p jerasol_workspace
          cd jerasol_workspace
          
          # Initialize with aggressive depth limits
          ../bin/repo init -u https://github.com -b lineage-20.0 --depth=1 --git-lfs --no-tags
          
          # Optimized sync dropping heavy binary history tracks to save space
          ../bin/repo sync -c -j2 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

      - name: Compile Custom Jerasol Framework Blocks
        run: |
          cd jerasol_workspace
          source build/envsetup.sh
          lunch aosp_arm64-userdebug
          mka bionic -j1
